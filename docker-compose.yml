services:
  lightpanda:
    profiles: ["lightpanda"]
    image: lightpanda/browser:nightly
    command: ["serve", "--host", "0.0.0.0", "--port", "9222"]
    ports:
      - "127.0.0.1:9222:9222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9222/json/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  kindly-server:
    build: .
    environment:
      KINDLY_BROWSER_ENGINE: ${KINDLY_BROWSER_ENGINE:-chromium}
      KINDLY_LIGHTPANDA_HOST: lightpanda
      KINDLY_LIGHTPANDA_PORT: "9222"
    env_file:
      - .env
    stdin_open: true
    entrypoint: ["mcp-web-search"]
    command: ["--stdio"]
