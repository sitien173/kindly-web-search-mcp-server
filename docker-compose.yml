services:
 kindly-server:
    build: .
    ports:
      - "${FASTMCP_PORT:-8000}:${FASTMCP_PORT:-8000}"
    environment:
      KINDLY_BROWSER_ENGINE: ${KINDLY_BROWSER_ENGINE:-lightpanda}
      KINDLY_LIGHTPANDA_HOST: ${KINDLY_LIGHTPANDA_HOST:-host.docker.internal}
      KINDLY_LIGHTPANDA_PORT: ${KINDLY_LIGHTPANDA_PORT:-9222}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    stdin_open: true
    entrypoint: ["mcp-web-search"]
    command: ["--http", "--mount-path", "/"]
